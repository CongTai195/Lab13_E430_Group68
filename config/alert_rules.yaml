alerts:
  - name: high_latency_p95
    severity: P2
    condition: latency_p95 > 1000
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#1-high-latency-p95
  - name: high_error_rate
    severity: P1
    condition: error_rate_pct > 1
    type: symptom-based
    owner: team-oncall
    runbook: docs/alerts.md#2-high-error-rate
  - name: budget_threshold_exceeded
    severity: P2
    condition: total_cost_usd > 2.0
    type: cost-based
    owner: finops-owner
    runbook: docs/alerts.md#3-budget-threshold-exceeded
  - name: quality_degradation
    severity: P3
    condition: quality_avg < 0.85
    type: quality-based
    owner: product-owner
    runbook: docs/alerts.md#4-quality-degradation
